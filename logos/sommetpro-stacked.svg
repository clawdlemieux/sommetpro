<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 180" width="200" height="180">
  <!-- Mountain Icon - centered -->
  <g transform="translate(50, 10)">
    <!-- Back peak (shorter, wider) - Warm Stone -->
    <polygon points="10,90 50,15 90,90" fill="#C4A882"/>
    <!-- Front peak (taller, narrower) - Forest Green -->
    <polygon points="28,90 60,2 92,90" fill="#2D4A3E"/>
  </g>

  <!-- Wordmark - centered below -->
  <text x="100" y="135" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="30" fill="#2D4A3E" letter-spacing="4" text-anchor="middle">SOMMET</text>
  <text x="100" y="165" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="30" fill="#2D4A3E" letter-spacing="4" text-anchor="middle">PRO</text>
</svg>